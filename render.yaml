services:
  - type: web
    name: hate-speech-detection
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python -c "import nltk; nltk.download('stopwords')"
    startCommand: gunicorn app_render:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
    plan: free
